<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frame — Photo Border & Metadata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

<!-- EXIF reading — full bundle for RAW (TIFF/NEF/ARW/RAF/DNG) support -->
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>

<!-- Lazy-loaded HEIC converter -->
<script>
  window.__loadHeic2any = function () {
    return new Promise((resolve, reject) => {
      if (window.heic2any) return resolve(window.heic2any);
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.js';
      s.onload  = () => resolve(window.heic2any);
      s.onerror = () => reject(new Error('Could not load HEIC converter'));
      document.head.appendChild(s);
    });
  };
</script>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">Frame<span>.</span></div>
    <div class="tag">Photo border + EXIF</div>
  </header>

  <div class="controls">
    <label class="drop" id="drop">
      <!--
        Accept list covers:
          Standard:  image/* (JPEG, PNG, WebP, …)
          HEIC/HEIF: Apple Live Photos
          RAW:       Fuji RAF · Canon CR2/CR3 · Nikon NEF/NRW
                     Sony ARW/SR2/SRF · Apple/Adobe DNG
      -->
      <input type="file" id="file"
        accept="image/*,.heic,.heif,.raf,.cr2,.cr3,.nef,.nrw,.arw,.sr2,.srf,.dng" />
      <div class="drop-icon">+</div>
      <div class="drop-text">
        <strong id="dropLabel">Upload a photo</strong>
        <small>JPEG · PNG · HEIC · RAW (RAF, CR2/3, NEF, ARW, DNG) · drag, drop, or tap</small>
      </div>
    </label>
    <div class="field">
      <label>Border ratio</label>
      <div class="range-row">
        <input type="range" id="border" min="3" max="12" step="0.5" value="6" />
        <span id="borderVal">6%</span>
      </div>
    </div>
    <div class="field">
      <label>Aspect</label>
      <select id="aspect">
        <option value="native">Native</option>
        <option value="square">Square 1:1</option>
        <option value="4:5">Portrait 4:5</option>
        <option value="3:2">Classic 3:2</option>
      </select>
    </div>
  </div>

  <div class="toggles">
    <div class="toggles-label">Show in footer</div>
    <div class="chips" id="chips">
      <label class="chip"><input type="checkbox" data-field="brand"      checked /><span>Camera</span></label>
      <label class="chip"><input type="checkbox" data-field="lens"       checked /><span>Lens</span></label>
      <label class="chip"><input type="checkbox" data-field="focal"      checked /><span>Focal</span></label>
      <label class="chip"><input type="checkbox" data-field="aperture"   checked /><span>Aperture</span></label>
      <label class="chip"><input type="checkbox" data-field="shutter"    checked /><span>Shutter</span></label>
      <label class="chip"><input type="checkbox" data-field="iso"        checked /><span>ISO</span></label>
      <label class="chip"><input type="checkbox" data-field="megapixels"         /><span>Megapixels</span></label>
      <label class="chip"><input type="checkbox" data-field="resolution"         /><span>Resolution</span></label>
    </div>
  </div>

  <div class="stage empty" id="stage">
    <div class="empty-mark">Your framed photo appears here</div>
    <div class="empty-sub">— upload to begin —</div>
  </div>

  <div class="actions">
    <div class="meta-readout" id="readout">
      <b>No metadata yet.</b> Camera, lens, and exposure data appear once a photo is loaded.
    </div>
    <div style="display:flex; gap:10px;">
      <button class="ghost" id="reset"    disabled>Reset</button>
      <button              id="download" disabled>Download</button>
    </div>
  </div>

  <footer>
    <span>Reads EXIF locally — your photo never leaves your device</span>
    <span>v1.1</span>
  </footer>
</div>

<div class="toast" id="toast">Saved</div>

<script src="raw.js"></script>
<script src="app.js"></script>
</body>
</html>
