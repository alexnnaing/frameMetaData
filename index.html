<script>
  // Lazy-load heic2any only when needed, so a CDN hiccup never blocks JPEGs
  window.__loadHeic2any = function () {
    return new Promise((resolve, reject) => {
      if (window.heic2any) return resolve(window.heic2any);
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.js';
      s.onload = () => resolve(window.heic2any);
      s.onerror = () => reject(new Error('Could not load HEIC converter'));
      document.head.appendChild(s);
    });
  };
</script>
<style>
  :root {
    --bg: #ece8e1;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --line: #1a1a1a;
    --paper: #f6f3ec;
    --accent: #c8472b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);

  header {

    padding-bottom: 14px;
    margin-bottom: 28px;

  .brand {

.controls {
display: grid;
grid-template-columns: 1fr;

.drop {

border: 1.5px dashed var(–line);
background: var(–paper);
padding: 22px;
cursor: pointer;
transition: background 0.2s, border-color 0.2s;
min-height: 110px;

border-color: var(–accent);

width: 56px; height: 56px;
border: 1.5px solid var(–line);
display: flex; align-items: center; justify-content: center;
border-radius: 50%;
flex-shrink: 0;
font-size: 22px;
}
.drop-text { flex: 1; }
.drop-text strong {
display: block;
font-size: 19px;
font-weight: 500;
margin-bottom: 2px;
}
.drop-text small {
font-family: ‘JetBrains Mono’, monospace;
font-size: 11px;
color: var(–muted);
letter-spacing: 0.05em;
}

.field {
background: var(–paper);
border: 1px solid var(–line);
padding: 14px 16px;
display: flex;

}

font-size: 10px;
text-transform: uppercase;
letter-spacing: 0.18em;
color: var(–muted);
margin-bottom: 6px;
}

background: transparent;
border: none;
font-family: ‘Fraunces’, serif;
font-size: 17px;
color: var(–ink);
width: 100%;
cursor: pointer;
}
.field select:focus, .field input:focus { outline: none; }
.range-row {
display: flex; align-items: center; gap: 10px;
}
.range-row span {

}

.stage {

border: 1px solid var(–line);
padding: 28px;

align-items: center;

.stage.empty {

}
.stage canvas {

max-height: 70vh;
height: auto;

.actions {

gap: 12px;

align-items: center;
justify-content: space-between;
}

font-size: 12px;

letter-spacing: 0.18em;
padding: 14px 22px;
border: 1px solid var(–line);
background: var(–ink);

cursor: pointer;
transition: all 0.15s;
}
button:hover:not(:disabled) {
background: var(–accent);
border-color: var(–accent);
}

color: var(–ink);

color: var(–bg);

footer {
margin-top: 40px;
border-top: 1px solid var(–line);
padding-top: 14px;
font-family: ‘JetBrains Mono’, monospace;
font-size: 10px;
text-transform: uppercase;
letter-spacing: 0.18em;
color: var(–muted);
display: flex;
justify-content: space-between;
}

.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–ink);

<script>
(function () {
  const fileInput = document.getElementById('file');
  const drop = document.getElementById('drop');
  const dropLabel = document.getElementById('dropLabel');
  const stage = document.getElementById('stage');
  const borderEl = document.getElementById('border');
  const borderVal = document.getElementById('borderVal');
  const aspectEl = document.getElementById('aspect');
  const readout = document.getElementById('readout');
  const downloadBtn = document.getElementById('download');
  const resetBtn = document.getElementById('reset');
  const toast = document.getElementById('toast');

  let currentImage = null;
  let currentMeta = null;
  let currentName = 'photo';

  borderEl.addEventListener('input', () => {
    borderVal.textContent = borderEl.value + '%';
    if (currentImage) render();
  });
  aspectEl.addEventListener('change', () => { if (currentImage) render(); });

  ['dragenter', 'dragover'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); })
  );
  ['dragleave', 'drop'].forEach(ev =>
    drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); })
  );
  drop.addEventListener('drop', e => {
    if (e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files && e.target.files[0]) handleFile(e.target.files[0]);
  });

  resetBtn.addEventListener('click', () => {
    currentImage = null;
    currentMeta = null;
    fileInput.value = '';
    dropLabel.textContent = 'Upload a photo';
    stage.classList.add('empty');
    stage.innerHTML = '<div class="empty-mark">Your framed photo appears here</div><div class="empty-sub">— upload to begin —</div>';
    readout.innerHTML = '<b>No metadata yet.</b> Camera, lens, and exposure data appear once a photo is loaded.';
    downloadBtn.disabled = true;
    resetBtn.disabled = true;
  });

  downloadBtn.addEventListener('click', async () => {
    if (!currentImage) return;
    downloadBtn.disabled = true;
    showToast('Rendering full size...');

    // Yield so the toast paints before the heavy render blocks the main thread
    await new Promise(r => setTimeout(r, 50));

    try {
      // Render at native resolution. The image's source dimensions are the
      // ceiling we care about — go bigger than that and we'd just be upscaling.
      const nativeMax = Math.max(currentImage.naturalWidth, currentImage.naturalHeight) * 1.2;
      // Hard ceiling to stay within browser canvas limits (most allow ~16384px,
      // but memory failure usually hits well before that on mobile).
      const safetyCap = 8192;
      const fullCanvas = renderToCanvas(Math.min(nativeMax, safetyCap));
      if (!fullCanvas) throw new Error('Render failed');

      fullCanvas.toBlob(blob => {
        if (!blob) {
          showToast('Export failed — try smaller border');
          downloadBtn.disabled = false;
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentName.replace(/\.[^.]+$/, '') + '_framed.jpg';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        showToast('Downloaded');
        downloadBtn.disabled = false;
      }, 'image/jpeg', 0.95);
    } catch (err) {
      console.error('Full-res render failed:', err);
      showToast('Export failed: ' + (err.message || 'unknown'));
      downloadBtn.disabled = false;
    }
  });

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  }

  function loadImageFromBlob(blob) {
    // Try the standard <img> path first; fall back to createImageBitmap which
    // handles some files (CMYK JPEGs, certain progressive encodings) that <img> rejects.
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        // naturalWidth of 0 means decode silently failed
        if (img.naturalWidth === 0) {
          URL.revokeObjectURL(url);
          tryBitmap();
        } else {
          resolve({ image: img, cleanup: () => URL.revokeObjectURL(url) });
        }
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        tryBitmap();
      };
      img.src = url;

      function tryBitmap() {
        if (typeof createImageBitmap !== 'function') {
          return reject(new Error('Browser cannot decode this image'));
        }
        createImageBitmap(blob)
          .then(bmp => resolve({ image: bmp, cleanup: () => bmp.close && bmp.close() }))
          .catch(err => reject(err));
      }
    });
  }

  async function parseExifSafe(file) {
    // Don't let EXIF parsing block the image. Race it with a timeout, and
    // never let a parse error stop us from rendering the photo.
    if (typeof window.exifr === 'undefined') return {};
    try {
      const parsePromise = window.exifr.parse(file, {
        tiff: true, exif: true, ifd0: true, gps: false, xmp: false, icc: false
      });
      const timeout = new Promise(resolve => setTimeout(() => resolve(null), 6000));
      const result = await Promise.race([parsePromise, timeout]);
      return result || {};
    } catch (e) {
      console.warn('EXIF parse failed:', e);
      return {};
    }
  }

  function isHeic(file) {
    const name = (file.name || '').toLowerCase();
    const type = (file.type || '').toLowerCase();
    return name.endsWith('.heic') || name.endsWith('.heif') ||
           type === 'image/heic' || type === 'image/heif';
  }

  async function handleFile(file) {
    currentName = file.name || 'photo';
    dropLabel.textContent = currentName.length > 38 ? currentName.slice(0, 35) + '...' : currentName;
    showToast('Loading...');

    // Kick off EXIF parsing in the background — it must not block the image
    const exifPromise = parseExifSafe(file);

    // If HEIC, convert to JPEG blob first
    let imageBlob = file;
    if (isHeic(file)) {
      showToast('Converting HEIC...');
      try {
        const heic2any = await window.__loadHeic2any();
        const converted = await heic2any({
          blob: file, toType: 'image/jpeg', quality: 0.92
        });
        imageBlob = Array.isArray(converted) ? converted[0] : converted;
      } catch (err) {
        console.error('HEIC conversion error:', err);
        showToast('HEIC failed: ' + (err.message || 'unknown'));
        return;
      }
    }

    try {
      const { image } = await loadImageFromBlob(imageBlob);
      currentImage = image;
      if (typeof image.naturalWidth === 'undefined') {
        Object.defineProperty(image, 'naturalWidth', { get: () => image.width });
        Object.defineProperty(image, 'naturalHeight', { get: () => image.height });
      }
      const exif = await exifPromise;
      currentMeta = parseMeta(exif || {});
      render();
      downloadBtn.disabled = false;
      resetBtn.disabled = false;
      showToast('Loaded');
    } catch (err) {
      console.error('Image load error:', err, 'file size:', file.size, 'type:', file.type, 'name:', file.name);
      const msg = err && err.message ? err.message : 'unknown';
      showToast('Decode failed: ' + msg);
    }
  }

  function parseMeta(exif) {
    const make = (exif.Make || '').trim();
    const model = (exif.Model || '').trim();
    const fNum = exif.FNumber || exif.ApertureValue;
    const exposure = exif.ExposureTime;
    const focal = exif.FocalLength;
    const focal35 = exif.FocalLengthIn35mmFormat;
    const iso = exif.ISO || exif.ISOSpeedRatings || exif.PhotographicSensitivity;
    const lens = (exif.LensModel || '').trim();

    return {
      make, model, fNum, exposure, focal, focal35, iso, lens,
      hasAny: !!(make || model || fNum || exposure || focal || iso)
    };
  }

  function formatShutter(t) {
    if (!t) return '';
    if (t >= 1) return t + '"';
    const denom = Math.round(1 / t);
    return '1/' + denom;
  }

  function formatBrand(make, model) {
    if (!make && !model) return '';
    if (!make) return model;
    if (!model) return make;
    // If model already starts with make (e.g., "Canon EOS R5"), don't duplicate
    if (model.toUpperCase().startsWith(make.toUpperCase())) return model;
    return make + ' ' + model;
  }

  function brandTitleCase(s) {
    if (!s) return '';
    const cleaned = s.replace(/\b(CORPORATION|IMAGING|COMPANY|CO\.?,?\s*LTD\.?)\b/gi, '').trim();
    // Only normalize words that are pure-alpha all-caps (e.g., "NIKON", "FUJIFILM").
    // Preserve model codes that mix letters and digits or hyphens (e.g., "X-T50", "EOS R5").
    return cleaned.split(/\s+/).map(w => {
      if (/^[A-Z]+$/.test(w) && w.length > 1) {
        return w[0] + w.slice(1).toLowerCase();
      }
      return w;
    }).join(' ').replace(/\s+/g, ' ').trim();
  }

  function renderToCanvas(maxDim) {
    if (!currentImage) return null;

    const img = currentImage;
    const aspect = aspectEl.value;
    const borderPct = parseFloat(borderEl.value) / 100;

    let srcW = img.naturalWidth, srcH = img.naturalHeight;
    let cropW = srcW, cropH = srcH, cropX = 0, cropY = 0;

    if (aspect !== 'native') {
      const ratios = { 'square': 1, '4:5': 4 / 5, '3:2': 3 / 2 };
      const target = ratios[aspect];
      const currentR = srcW / srcH;
      if (currentR > target) {
        cropW = Math.round(srcH * target);
        cropX = Math.round((srcW - cropW) / 2);
      } else {
        cropH = Math.round(srcW / target);
        cropY = Math.round((srcH - cropH) / 2);
      }
    }

    const longEdge = Math.max(cropW, cropH);
    const border = Math.round(longEdge * borderPct);
    const footer = Math.round(longEdge * borderPct * 2.0);

    const outW = cropW + border * 2;
    const outH = cropH + border + footer;

    const scale = Math.min(1, maxDim / Math.max(outW, outH));
    const fW = Math.round(outW * scale);
    const fH = Math.round(outH * scale);
    const fBorder = border * scale;
    const fFooter = footer * scale;
    const fImgW = cropW * scale;
    const fImgH = cropH * scale;

    const canvas = document.createElement('canvas');
    canvas.width = fW;
    canvas.height = fH;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, fW, fH);
    ctx.drawImage(img, cropX, cropY, cropW, cropH, fBorder, fBorder, fImgW, fImgH);
    drawFooter(ctx, fW, fH, fBorder, fFooter, fImgH);

    return canvas;
  }

  function render() {
    // Preview render — keep small for snappy on-screen updates
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const previewMax = isMobile ? 1600 : 2400;
    const canvas = renderToCanvas(previewMax);
    if (!canvas) return;

    stage.classList.remove('empty');
    stage.innerHTML = '';
    stage.appendChild(canvas);
    updateReadout();
  }

  function drawFooter(ctx, W, H, border, footer, imgH) {
    const m = currentMeta;
    const footerTop = border + imgH;
    const footerCenterY = footerTop + footer / 2;

    const brand = brandTitleCase(formatBrand(m.make, m.model));
    const lens = m.lens ? brandTitleCase(m.lens) : '';

    const techParts = [];
    if (m.focal) techParts.push(Math.round(m.focal) + 'mm');
    if (m.fNum) techParts.push('f/' + (m.fNum < 10 ? m.fNum.toFixed(1) : Math.round(m.fNum)));
    if (m.exposure) techParts.push(formatShutter(m.exposure));
    if (m.iso) techParts.push('ISO ' + m.iso);
    const tech = techParts.join('  ·  ');

    if (!brand && !tech && !m.hasAny) {
      ctx.fillStyle = '#999999';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.font = `italic 400 ${footer * 0.22}px "Fraunces", Georgia, serif`;
      ctx.fillText('No EXIF metadata', W / 2, footerCenterY);
      return;
    }

    // Typography sizing relative to footer height
    const brandSize = footer * 0.22;
    const subSize = footer * 0.12;
    const techSize = footer * 0.16;
    const padX = border * 1.2;
    const gap = footer * 0.06; // gap between stacked lines

    // Measure both columns to detect collision
    ctx.font = `700 ${brandSize}px Helvetica, "Helvetica Neue", Arial, sans-serif`;
    const brandWidth = brand ? ctx.measureText(brand).width : 0;
    ctx.font = `400 ${subSize}px "JetBrains Mono", monospace`;
    const lensWidth = lens ? ctx.measureText(lens).width : 0;
    ctx.font = `500 ${techSize}px "JetBrains Mono", monospace`;
    const techWidth = tech ? ctx.measureText(tech).width : 0;

    const leftWidth = Math.max(brandWidth, lensWidth);
    const minSeparator = footer * 0.5; // minimum gap between left/right blocks
    const totalNeeded = leftWidth + minSeparator + techWidth + padX * 2;
    const horizontal = totalNeeded <= W;

    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#1a1a1a';

    if (horizontal) {
      // ── Two-column horizontal layout ──
      // Left column: brand on top, lens below (vertically centered as a block)
      const leftLines = [];
      if (brand) leftLines.push({ text: brand, size: brandSize, font: `700 ${brandSize}px Helvetica, "Helvetica Neue", Arial, sans-serif`, color: '#1a1a1a' });
      if (lens) leftLines.push({ text: lens, size: subSize, font: `400 ${subSize}px "JetBrains Mono", monospace`, color: '#888888' });
      drawStack(ctx, leftLines, padX, footerCenterY, gap, 'left');

      // Right column: tech, vertically centered
      if (tech) {
        ctx.fillStyle = '#1a1a1a';
        ctx.font = `500 ${techSize}px "JetBrains Mono", monospace`;
        ctx.textAlign = 'right';
        ctx.fillText(tech, W - padX, footerCenterY);
      }

      // Subtle vertical separator if both sides have content and there's room
      if (brand && tech) {
        const leftEdge = padX + leftWidth;
        const rightEdge = W - padX - techWidth;
        if (rightEdge - leftEdge > footer * 0.5) {
          const lineX = (leftEdge + rightEdge) / 2;
          ctx.strokeStyle = '#d8d8d8';
          ctx.lineWidth = Math.max(1, footer * 0.008);
          ctx.beginPath();
          ctx.moveTo(lineX, footerCenterY - footer * 0.22);
          ctx.lineTo(lineX, footerCenterY + footer * 0.22);
          ctx.stroke();
        }
      }
    } else {
      // ── Stacked centered layout for narrow footers ──
      const lines = [];
      if (brand) lines.push({ text: brand, size: brandSize, font: `700 ${brandSize}px Helvetica, "Helvetica Neue", Arial, sans-serif`, color: '#1a1a1a' });
      if (lens)  lines.push({ text: lens, size: subSize, font: `400 ${subSize}px "JetBrains Mono", monospace`, color: '#888888' });
      if (tech)  lines.push({ text: tech, size: techSize, font: `500 ${techSize}px "JetBrains Mono", monospace`, color: '#1a1a1a' });
      drawStack(ctx, lines, W / 2, footerCenterY, gap, 'center');
    }
  }

  // Draw a vertical stack of text lines, vertically centered around centerY
  function drawStack(ctx, lines, x, centerY, gap, align) {
    if (!lines.length) return;
    const totalHeight = lines.reduce((s, l) => s + l.size, 0) + gap * (lines.length - 1);
    let y = centerY - totalHeight / 2;
    ctx.textAlign = align;
    ctx.textBaseline = 'top';
    for (const line of lines) {
      ctx.fillStyle = line.color;
      ctx.font = line.font;
      ctx.fillText(line.text, x, y);
      y += line.size + gap;
    }
    ctx.textBaseline = 'middle'; // restore
  }

  function updateReadout() {
    const m = currentMeta;
    if (!m.hasAny) {
      readout.innerHTML = '<b>No EXIF found.</b> The photo will be framed without specs.';
      return;
    }
    const parts = [];
    const brand = brandTitleCase(formatBrand(m.make, m.model));
    if (brand) parts.push('<b>' + brand + '</b>');
    if (m.focal) parts.push(Math.round(m.focal) + 'mm');
    if (m.fNum) parts.push('f/' + (m.fNum < 10 ? m.fNum.toFixed(1) : Math.round(m.fNum)));
    if (m.exposure) parts.push(formatShutter(m.exposure));
    if (m.iso) parts.push('ISO ' + m.iso);
    readout.innerHTML = parts.join('  ·  ');
  }
})();
</script>
